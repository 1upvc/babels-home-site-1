[build]
  publish = "public"
  command = "gatsby build"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "true"

[[plugins]]
  package = "@netlify/plugin-lighthouse"
  [plugins.inputs]
  output_path = "reports/lighthouse.html"

[[plugins]]
  package = "@netlify/plugin-gatsby"

[[headers]]
  for = "/*"
  [headers.values]
    # No blanket cache-control here on purpose: a wildcard max-age would fight
    # gatsby-plugin-netlify's per-asset `immutable` headers for fingerprinted
    # JS/CSS. With no rule, HTML/page-data fall to Netlify's revalidating
    # default (so new routes/content are never held stale), while hashed assets
    # keep their long immutable cache. The prior 30-day /* rule was the bug.
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Robots-Tag = "index"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Vary = "Accept-Encoding"
    Permissions-Policy = "accelerometer=(), ambient-light-sensor=(), camera=(), encrypted-media=(self), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(self), usb=(), vibrate=(), vr=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://buttondown.email https://buttondown.com; frame-src 'self'; object-src 'none'; form-action 'self' https://buttondown.email https://buttondown.com"

[[headers]]
  for = "/static/*"
  [headers.values]
    cache-control = "public, max-age=31536000"
